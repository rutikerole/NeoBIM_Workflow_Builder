<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="ng" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>

  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="32" fill="#07080E"/>

  <!-- House outline -->
  <path d="M14 44 L14 26 L32 12 L50 26 L50 44" stroke="url(#sg)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Bottom bar -->
  <path d="M14 44 L24 44" stroke="url(#sg)" stroke-width="3" stroke-linecap="round"/>
  <path d="M24 44 L40 44" stroke="url(#sg)" stroke-width="3" stroke-linecap="round"/>
  <path d="M40 44 L50 44" stroke="url(#sg)" stroke-width="3" stroke-linecap="round"/>

  <!-- Corner nodes -->
  <circle cx="14" cy="44" r="4" fill="url(#ng)"/>
  <circle cx="14" cy="44" r="1.5" fill="white" opacity="0.7"/>

  <circle cx="14" cy="26" r="4" fill="url(#ng)"/>
  <circle cx="14" cy="26" r="1.5" fill="white" opacity="0.7"/>

  <circle cx="32" cy="12" r="4.5" fill="url(#ng)"/>
  <circle cx="32" cy="12" r="1.8" fill="white" opacity="0.8"/>

  <circle cx="50" cy="26" r="4" fill="url(#ng)"/>
  <circle cx="50" cy="26" r="1.5" fill="white" opacity="0.7"/>

  <circle cx="50" cy="44" r="4" fill="url(#ng)"/>
  <circle cx="50" cy="44" r="1.5" fill="white" opacity="0.7"/>

  <!-- Bottom bar nodes -->
  <circle cx="24" cy="44" r="3.2" fill="url(#ng)"/>
  <circle cx="24" cy="44" r="1.2" fill="white" opacity="0.6"/>

  <circle cx="40" cy="44" r="3.2" fill="url(#ng)"/>
  <circle cx="40" cy="44" r="1.2" fill="white" opacity="0.6"/>
</svg>
