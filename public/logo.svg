<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="ng" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>

  <!-- House outline: bottom-left -> top-left -> peak -> top-right -> bottom-right -->
  <path d="M10 48 L10 26 L32 8 L54 26 L54 48" stroke="url(#sg)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Bottom horizontal connector bar -->
  <path d="M10 48 L22 48" stroke="url(#sg)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M22 48 L42 48" stroke="url(#sg)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M42 48 L54 48" stroke="url(#sg)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Nodes at vertices -->
  <circle cx="10" cy="48" r="5" fill="url(#ng)" stroke="#1E3A5F" stroke-width="1.5"/>
  <circle cx="10" cy="48" r="2" fill="white" opacity="0.7"/>

  <circle cx="10" cy="26" r="5" fill="url(#ng)" stroke="#1E3A5F" stroke-width="1.5"/>
  <circle cx="10" cy="26" r="2" fill="white" opacity="0.7"/>

  <circle cx="32" cy="8" r="5.5" fill="url(#ng)" stroke="#1E3A5F" stroke-width="1.5"/>
  <circle cx="32" cy="8" r="2.2" fill="white" opacity="0.8"/>

  <circle cx="54" cy="26" r="5" fill="url(#ng)" stroke="#1E3A5F" stroke-width="1.5"/>
  <circle cx="54" cy="26" r="2" fill="white" opacity="0.7"/>

  <circle cx="54" cy="48" r="5" fill="url(#ng)" stroke="#1E3A5F" stroke-width="1.5"/>
  <circle cx="54" cy="48" r="2" fill="white" opacity="0.7"/>

  <!-- Bottom connector nodes -->
  <circle cx="22" cy="48" r="4" fill="url(#ng)" stroke="#1E3A5F" stroke-width="1.5"/>
  <circle cx="22" cy="48" r="1.5" fill="white" opacity="0.6"/>

  <circle cx="42" cy="48" r="4" fill="url(#ng)" stroke="#1E3A5F" stroke-width="1.5"/>
  <circle cx="42" cy="48" r="1.5" fill="white" opacity="0.6"/>
</svg>
